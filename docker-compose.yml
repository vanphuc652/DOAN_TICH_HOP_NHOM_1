services:
  # Database MySQL cho Web Store
  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webstore
    ports:
      - "3306:3306"

  # Database PostgreSQL cho Finance
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: finance
    ports:
      - "5432:5432"

  # Dịch vụ Report (Module 3)
  report_service:
    build: ./report_service
    ports:
      - "8001:8000"
    depends_on:
      - mysql-db
      - postgres

  # Dịch vụ Legacy Adapter
  legacy-adapter:
    build: ./legacy_adapter
    depends_on:
      - mysql-db

  # =========================
  # KONG GATEWAY (MODULE 5)
  # =========================
  kong:
    image: kong:2.8
    container_name: kong_gateway
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - report_service