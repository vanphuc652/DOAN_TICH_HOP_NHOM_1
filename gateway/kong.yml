_format_version: "2.1"
_transform: true

services:

  # =========================
  # ORDER API SERVICE
  # =========================
  - name: order-service
    url: http://order_api:8000
    routes:
      - name: order-route
        paths:
          - /orders
    plugins:
      - name: key-auth
      - name: rate-limiting
        config:
          minute: 10
          policy: local

  # =========================
  # REPORT SERVICE
  # =========================
  - name: report-service
    url: http://report_service:8000
    routes:
      - name: report-route
        paths:
          - /report
    plugins:
      - name: key-auth
      - name: rate-limiting
        config:
          minute: 10
          policy: local

# =========================
# CONSUMER (API KEY)
# =========================
consumers:
  - username: client_app
    keyauth_credentials:
      - key: noah-secret-key